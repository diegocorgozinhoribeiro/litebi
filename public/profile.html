<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Perfil — LiteBI</title><style>
:root{--blue:#5e9fe8;--green:#72bc8f;--ink:#182230;--muted:#667085;--line:#e7ebf0;--bg:#f7f9fc}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 5% 0,rgba(94,159,232,.13),transparent 34rem),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{height:72px;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(16,24,40,.07);display:flex;align-items:center;justify-content:space-between;padding:0 max(22px,calc((100% - 1180px)/2));position:sticky;top:0;z-index:2}.brand{font-size:21px;font-weight:850;letter-spacing:-.05em;text-decoration:none;color:var(--ink)}.brand span{color:var(--blue)}nav{display:flex;align-items:center;gap:9px}.btn{border:0;border-radius:10px;padding:10px 14px;text-decoration:none;font-size:13px;font-weight:750;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--blue),var(--green))}.ghost{color:var(--ink);background:#fff;border:1px solid var(--line)}.wrap{max-width:960px;margin:auto;padding:52px 22px}.profile-card,.panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(16,24,40,.06)}.profile-card{padding:30px;display:flex;gap:22px;align-items:center}.avatar{width:78px;height:78px;border-radius:24px;background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;display:grid;place-items:center;font-size:30px;font-weight:850}.profile-card h1{font-size:30px;letter-spacing:-.05em;margin:0 0 5px}.profile-card p{color:var(--muted);margin:0;font-size:14px}.profile-card small{display:block;color:#98a2b3;margin-top:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.panel{padding:24px}.panel h2{font-size:18px;letter-spacing:-.03em;margin:0 0 5px}.panel>p{font-size:13px;color:var(--muted);margin:0 0 20px}.field{margin-bottom:14px}.field label{display:block;font-size:12px;font-weight:750;margin-bottom:6px}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:13px}.field textarea{min-height:92px;resize:vertical}.msg{min-height:18px;font-size:12px;color:#368458}.people{display:grid;gap:9px}.person{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:11px;padding:10px}.person-main{display:flex;gap:10px;align-items:center}.person-avatar{width:34px;height:34px;border-radius:11px;background:#edf5fd;color:#4c8ed5;display:grid;place-items:center;font-weight:800}.person b{font-size:13px}.person small{display:block;color:var(--muted);font-size:11px}.person .btn{padding:7px 9px;font-size:11px}.dash-list{display:grid;gap:9px}.dash-link{padding:12px 14px;border:1px solid var(--line);border-radius:11px;text-decoration:none;color:var(--ink);font-size:13px}.dash-link small{display:block;color:var(--muted);margin-top:4px}@media(max-width:700px){.grid{grid-template-columns:1fr}.profile-card{align-items:flex-start;flex-direction:column}.profile-card h1{font-size:26px}} 
</style></head><body><header><a class="brand" href="/home">Lite<span>BI</span></a><nav><a class="btn ghost" href="/home">Início</a><a class="btn primary" href="/builder?new=1">Novo dashboard</a></nav></header><main class="wrap"><section class="profile-card"><div class="avatar" id="avatar">?</div><div><h1 id="name">Meu perfil</h1><p id="email"></p><small id="joined"></small></div></section><div class="grid"><section class="panel"><h2>Editar perfil</h2><p>Apresente-se para as pessoas das suas equipes.</p><form id="profileForm"><div class="field"><label>Nome</label><input id="nameInput" required></div><div class="field"><label>Sobre você</label><textarea id="bioInput" maxlength="240" placeholder="Ex.: Analista de vendas e criador de dashboards."></textarea></div><div class="msg" id="profileMsg"></div><button class="btn primary">Salvar perfil</button></form></section><section class="panel"><h2>Adicionar amigos</h2><p>Encontre pessoas pelo nome ou e-mail.</p><div class="field"><input id="search" placeholder="Buscar pessoa..."></div><div class="people" id="searchResults"></div></section><section class="panel"><h2>Pedidos e amigos</h2><p>Conexões que ajudam seus dados a circularem.</p><div class="people" id="friends"></div></section><section class="panel"><h2>Dashboards públicos</h2><p>Seus dashboards públicos aparecem aqui.</p><div class="dash-list" id="publicDashboards"></div></section></div></main><script>
const $=s=>document.querySelector(s),esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),api=(m,u,b)=>fetch(u,{method:m,headers:{'Content-Type':'application/json'},credentials:'same-origin',body:b?JSON.stringify(b):undefined}).then(r=>r.json().then(data=>({ok:r.ok,status:r.status,data})));let me=null;function initial(s){return String(s||'?').trim().slice(0,1).toUpperCase()}
function renderProfile(p){me=p;$('#name').textContent=p.name||'Sem nome';$('#email').textContent=p.email+(p.bio?' · '+p.bio:'');$('#joined').textContent='Membro do LiteBI desde '+new Date(p.created_at||Date.now()).toLocaleDateString('pt-BR');$('#avatar').textContent=initial(p.name||p.email);$('#nameInput').value=p.name||'';$('#bioInput').value=p.bio||''}
function renderPublic(items){$('#publicDashboards').innerHTML=(items||[]).map(d=>'<a class="dash-link" href="/d/'+d.slug+'" target="_blank">'+esc(d.title)+'<small>'+((d.views||0)+' visualizações')+'</small></a>').join('')||'<span style="color:#667085;font-size:13px">Nenhum dashboard público ainda.</span>'}
function loadFriends(){api('GET','/api/friends').then(r=>{$('#friends').innerHTML=(r.data.friends||[]).map(f=>{if(f.status==='pending'&&f.addressee_id===me.id)return '<div class="person"><div class="person-main"><div class="person-avatar">'+initial(f.name)+'</div><div><b>'+esc(f.name||f.email)+'</b><small>Quer ser seu amigo</small></div></div><button class="btn primary" data-accept="'+f.id+'">Aceitar</button></div>';return '<div class="person"><div class="person-main"><div class="person-avatar">'+initial(f.name)+'</div><div><b>'+esc(f.name||f.email)+'</b><small>'+(f.status==='accepted'?'Amigo':'Pedido pendente')+'</small></div></div>'+(f.status==='accepted'?'<button class="btn ghost" data-remove="'+f.id+'">Remover</button>':'')+'</div>'}).join('')||'<span style="color:#667085;font-size:13px">Você ainda não tem conexões.</span>'})}
$('#search').oninput=e=>{const q=e.target.value.trim();if(q.length<2){$('#searchResults').innerHTML='';return}api('GET','/api/users/search?q='+encodeURIComponent(q)).then(r=>{$('#searchResults').innerHTML=(r.data.users||[]).map(u=>'<div class="person"><div class="person-main"><div class="person-avatar">'+initial(u.name)+'</div><div><b>'+esc(u.name||u.email)+'</b><small>'+esc(u.email)+'</small></div></div><button class="btn primary" data-add="'+u.id+'">Adicionar</button></div>').join('')||'<span style="color:#667085;font-size:13px">Nenhuma pessoa encontrada.</span>'})};document.addEventListener('click',e=>{const add=e.target.closest('[data-add]');if(add)api('POST','/api/friends/'+add.dataset.add).then(loadFriends);const accept=e.target.closest('[data-accept]');if(accept)api('PATCH','/api/friends/'+accept.dataset.accept,{status:'accepted'}).then(loadFriends);const remove=e.target.closest('[data-remove]');if(remove)api('DELETE','/api/friends/'+remove.dataset.remove).then(loadFriends)});$('#profileForm').onsubmit=e=>{e.preventDefault();api('PATCH','/api/profile',{name:$('#nameInput').value,bio:$('#bioInput').value}).then(r=>{if(!r.ok){$('#profileMsg').textContent=r.data.error;return}renderProfile(r.data.profile);$('#profileMsg').textContent='Perfil salvo.'})};Promise.all([api('GET','/api/profile'),api('GET','/api/friends')]).then(rs=>{renderProfile(rs[0].data.profile);$('#friends').innerHTML=(rs[1].data.friends||[]).map(f=>'<div class="person"><div class="person-main"><div class="person-avatar">'+initial(f.name)+'</div><div><b>'+esc(f.name||f.email)+'</b><small>'+esc(f.status)+'</small></div></div></div>').join('')||'<span style="color:#667085;font-size:13px">Você ainda não tem conexões.</span>'});
</script><script>api('GET','/api/profile').then(function(r){if(r.ok)renderPublic(r.data.dashboards||[])});</script></body></html>
